name: Deploy GitHub Pages snapshot

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate snapshot JSONs
        run: python3 snapshot.py

      - name: Copy static site into docs/
        run: |
          # docs/index.html is a fixed redirect to the Railway production
          # deployment and must never be overwritten by this workflow.
          cp static/app.js docs/app.js
          [ -f static/style.css ] && cp static/style.css docs/style.css
          rm -rf docs/snapshot
          cp -r snapshot docs/snapshot

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-update GitHub Pages snapshot [skip ci]"
            git push
          fi
